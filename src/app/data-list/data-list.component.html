<div class="data-list-container">
  <h2>Data List</h2>
  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Value</th>
        <th>Date</th>
        <th>Name</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of dataList">
        <td>{{ item.id }}</td>
        <td>{{ item.value | currency }}</td>
        <td>{{ item.date | date: 'longDate' }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.description }}</td>
      </tr>
    </tbody>
  </table>
</div>
